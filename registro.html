<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href=",/css/bootstrap.min.css">
  <link rel="stylesheet" href=",/css/registro.css" >
  <script src=",/js/jquery-4.0.0.min.js"></script>
  <script src=",/js/registro.js"></script>
</head>

<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-5">
      <div class="registro-container">
        <h2 class="text-center">Crear Cuenta</h2>
        <form id="formRegistro" autocomplete="off">
          <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" class="form-control" id="usuario" name="usuario" autocomplete="off" required>
          </div>
          <div class="form-group">
            <label for="correo">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" name="correo" autocomplete="off" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" name="clave" autocomplete="off" required>
          </div>
          <div class="form-group">
            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" class="form-control" id="confirmar" name="confirmar" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Registrarse</button>
          <a href="/index.html" class="btn btn-link w-100">Volver al inicio</a>
        </form>
      </div>
    </div>
  </div>
  <footer class="footer mt-5">
    <p>&copy; 2026 My Alke Wallet. Derechos reservados.</p>
  </footer>
</body>

</html>
