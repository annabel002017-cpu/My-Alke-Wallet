<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/index.css" >
  <script src="./js/jquery-4.0.0.min.js"></script>
  <script src="./js/index.js"></script>
</head>

<body>
  <div class="text-center mt-3">
    <h1>Bienvenido(a) a Alke Wallet</h1>
  </div>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-4">
      <div class="login-container">
        <h2 class="text-center">Iniciar Sesión</h2>
        <form id="formLogin" autocomplete="off">
          <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" class="form-control" id="usuario" name="usuario" autocomplete="off" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" name="clave" autocomplete="off" required>
          </div>
          <button type="submit" class="btn btn-primary w-50">Entrar</button>
          <a href="./registro.html" class="btn btn-link w-100">Registrarse</a>
        </form>
      </div>
    </div>
  </div>
  <footer class="footer mt-5">
    <p>&copy; 2026 My Alke Wallet. Derechos reservados.</p>
  </footer>
</body>
</html>
